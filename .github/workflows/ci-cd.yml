name: CI/CD — API

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

jobs:

  # ── Lint, type-check, test ───────────────────────────────────────────────
  quality:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --passWithNoTests

  # ── Build image and push to Docker Hub ──────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/production'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jmv-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/jmv-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy API only — admin stays running ────────────────────────────────
  deploy:
    name: Deploy API
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/production'

    steps:
      - name: Set PowerShell execution policy
        shell: powershell
        run: Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope CurrentUser -Force

      - name: Log in to Docker Hub
        shell: powershell
        run: |
          $username = "${{ secrets.DOCKERHUB_USERNAME }}"
          $token = "${{ secrets.DOCKERHUB_TOKEN }}"
          $token | docker login -u $username --password-stdin

      - name: Pull new image
        working-directory: D:\JVM-SERVER
        run: docker compose pull api

      - name: Restart API only
        working-directory: D:\JVM-SERVER
        run: docker compose up -d --no-deps api

      - name: Verify
        working-directory: D:\JVM-SERVER
        run: |
          Start-Sleep -Seconds 8
          docker compose ps api
          docker compose logs api --tail=20